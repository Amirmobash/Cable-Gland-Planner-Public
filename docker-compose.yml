version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: src/CableGlandPlanner.Api/Dockerfile
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Database=cablegland;Username=cablegland;Password=cablegland
      Redis__Host: redis:6379
    depends_on: [postgres, redis]
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cablegland
      POSTGRES_USER: cablegland
      POSTGRES_PASSWORD: cablegland
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7.2
    ports: ["6379:6379"]
volumes:
  pgdata:
